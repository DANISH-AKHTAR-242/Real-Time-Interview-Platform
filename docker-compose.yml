services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: interview_platform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d interview_platform']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: interview-platform-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  coturn:
    image: coturn/coturn:4.6.3
    container_name: interview-platform-coturn
    restart: unless-stopped
    command:
      - -n
      - -c
      - /etc/coturn/turnserver.conf
      - --external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}
    ports:
      - '3478:3478/udp'
      - '3478:3478/tcp'
      - '49160-49200:49160-49200/udp'
      - '49160-49200:49160-49200/tcp'
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

volumes:
  postgres_data:
  redis_data:
