# TURN server base config for local/dev and NAT traversal.
# Required fields from architecture request are present below.

listening-port=3478
listening-ip=0.0.0.0
fingerprint
lt-cred-mech
realm=interview.local
user=username:password

# Relay range: keep this narrow for Docker port publishing.
min-port=49160
max-port=49200

# Optional but recommended defaults.
no-multicast-peers
no-cli

# For production behind NAT, pass the public IP at runtime via:
# --external-ip=<PUBLIC_IP>
# in docker-compose command args.
